<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医疗知识库管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: #f8f9fa;
        }
        .container {
            max-width: 1200px;
        }
        .card {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .upload-area {
            border: 2px dashed #ced4da;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            border-color: #007bff;
            background-color: #f8f9ff;
        }
        .chat-container {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ced4da;
            border-radius: 8px;
            padding: 15px;
            background-color: #fff;
        }
        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
        }
        .user-message {
            background-color: #e3f2fd;
            align-self: flex-end;
        }
        .bot-message {
            background-color: #f1f1f1;
            align-self: flex-start;
        }
        .document-item {
            transition: all 0.3s ease;
        }
        .document-item:hover {
            background-color: #f8f9fa;
        }
        .tag {
            font-size: 0.8rem;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">医疗知识库管理系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">文档管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">搜索</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">聊天</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <!-- 左侧：文件上传和文档列表 -->
            <div class="col-md-8">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>上传文档</h5>
                    </div>
                    <div class="card-body">
                        <div class="upload-area" id="uploadArea">
                            <input type="file" id="fileInput" style="display: none;" multiple>
                            <i class="bi bi-cloud-upload" style="font-size: 4rem; color: #6c757d;"></i>
                            <h6 class="mt-3">点击或拖拽文件到此处上传</h6>
                            <p class="text-muted">支持 Word、PDF、图片、扫描件等格式</p>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h5>文档列表</h5>
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-3">
                            <input type="text" class="form-control" placeholder="搜索文档" id="documentSearch">
                            <button class="btn btn-primary" type="button" id="searchButton">搜索</button>
                        </div>
                        <div class="list-group" id="documentList">
                            <!-- 文档列表将通过JavaScript动态生成 -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：聊天和搜索 -->
            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>与文档对话</h5>
                    </div>
                    <div class="card-body">
                        <div class="chat-container mb-3" id="chatContainer">
                            <!-- 聊天消息将通过JavaScript动态生成 -->
                        </div>
                        <div class="input-group">
                            <input type="text" class="form-control" placeholder="输入问题..." id="chatInput">
                            <button class="btn btn-primary" type="button" id="sendButton">发送</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h5>快速搜索</h5>
                    </div>
                    <div class="card-body">
                        <div class="input-group mb-3">
                            <input type="text" class="form-control" placeholder="输入关键词..." id="quickSearchInput">
                            <button class="btn btn-primary" type="button" id="quickSearchButton">搜索</button>
                        </div>
                        <div id="searchResults">
                            <!-- 搜索结果将通过JavaScript动态生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 文档详情模态框 -->
    <div class="modal fade" id="documentModal" tabindex="-1" aria-labelledby="documentModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="documentModalLabel">文档详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="documentDetails">
                        <!-- 文档详情将通过JavaScript动态生成 -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        // 全局变量
        const API_BASE_URL = 'http://localhost:8000/api';

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 绑定事件
            bindEvents();
            // 加载文档列表
            loadDocuments();
        });

        // 绑定事件
        function bindEvents() {
            // 文件上传
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            
            uploadArea.addEventListener('click', function() {
                fileInput.click();
            });
            
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                uploadArea.style.borderColor = '#007bff';
            });
            
            uploadArea.addEventListener('dragleave', function() {
                uploadArea.style.borderColor = '#ced4da';
            });
            
            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                uploadArea.style.borderColor = '#ced4da';
                if (e.dataTransfer.files.length > 0) {
                    uploadFiles(e.dataTransfer.files);
                }
            });
            
            fileInput.addEventListener('change', function() {
                if (this.files.length > 0) {
                    uploadFiles(this.files);
                }
            });

            // 搜索按钮
            document.getElementById('searchButton').addEventListener('click', function() {
                const query = document.getElementById('documentSearch').value;
                searchDocuments(query);
            });

            // 快速搜索按钮
            document.getElementById('quickSearchButton').addEventListener('click', function() {
                const query = document.getElementById('quickSearchInput').value;
                quickSearch(query);
            });

            // 发送聊天消息
            document.getElementById('sendButton').addEventListener('click', function() {
                sendChatMessage();
            });

            // 按Enter发送聊天消息
            document.getElementById('chatInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendChatMessage();
                }
            });
        }

        // 上传文件
        function uploadFiles(files) {
            for (let file of files) {
                const formData = new FormData();
                formData.append('file', file);

                axios.post(`${API_BASE_URL}/documents/upload`, formData, {
                    headers: {
                        'Content-Type': 'multipart/form-data'
                    }
                })
                .then(response => {
                    console.log('文件上传成功:', response.data);
                    // 重新加载文档列表
                    loadDocuments();
                    // 显示成功消息
                    alert('文件上传成功！');
                })
                .catch(error => {
                    console.error('文件上传失败:', error);
                    alert('文件上传失败，请重试！');
                });
            }
        }

        // 加载文档列表
        function loadDocuments() {
            axios.get(`${API_BASE_URL}/documents`)
                .then(response => {
                    const documents = response.data;
                    renderDocumentList(documents);
                })
                .catch(error => {
                    console.error('加载文档列表失败:', error);
                });
        }

        // 渲染文档列表
        function renderDocumentList(documents) {
            const documentList = document.getElementById('documentList');
            documentList.innerHTML = '';

            if (documents.length === 0) {
                documentList.innerHTML = '<div class="list-group-item">暂无文档</div>';
                return;
            }

            documents.forEach(doc => {
                const item = document.createElement('div');
                item.className = 'list-group-item document-item';
                item.onclick = () => showDocumentDetails(doc.id);
                
                let tagsHtml = '';
                if (doc.tags && doc.tags.length > 0) {
                    tagsHtml = doc.tags.map(tag => `<span class="badge bg-secondary tag">${tag.name}</span>`).join('');
                }

                item.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center">
                        <h6>${doc.filename}</h6>
                        <span class="badge bg-primary">${doc.file_type}</span>
                    </div>
                    <p class="text-muted small">${doc.summary || '无摘要'}</p>
                    <div class="mt-2">${tagsHtml}</div>
                `;
                
                documentList.appendChild(item);
            });
        }

        // 搜索文档
        function searchDocuments(query) {
            if (!query) {
                loadDocuments();
                return;
            }

            axios.post(`${API_BASE_URL}/search`, { query })
                .then(response => {
                    const results = response.data;
                    renderSearchResults(results);
                })
                .catch(error => {
                    console.error('搜索失败:', error);
                });
        }

        // 快速搜索
        function quickSearch(query) {
            if (!query) return;

            axios.post(`${API_BASE_URL}/search`, { query })
                .then(response => {
                    const results = response.data;
                    renderQuickSearchResults(results);
                })
                .catch(error => {
                    console.error('搜索失败:', error);
                });
        }

        // 渲染搜索结果
        function renderSearchResults(results) {
            const documentList = document.getElementById('documentList');
            documentList.innerHTML = '';

            if (results.length === 0) {
                documentList.innerHTML = '<div class="list-group-item">未找到匹配的文档</div>';
                return;
            }

            results.forEach(result => {
                const item = document.createElement('div');
                item.className = 'list-group-item document-item';
                item.onclick = () => showDocumentDetails(result.document_id);
                
                let tagsHtml = '';
                if (result.tags && result.tags.length > 0) {
                    tagsHtml = result.tags.map(tag => `<span class="badge bg-secondary tag">${tag.name}</span>`).join('');
                }

                item.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center">
                        <h6>${result.filename}</h6>
                        <span class="badge bg-success">相似度: ${(result.score * 100).toFixed(1)}%</span>
                    </div>
                    <p class="text-muted small">${result.content || '无内容'}</p>
                    <div class="mt-2">${tagsHtml}</div>
                `;
                
                documentList.appendChild(item);
            });
        }

        // 渲染快速搜索结果
        function renderQuickSearchResults(results) {
            const searchResults = document.getElementById('searchResults');
            searchResults.innerHTML = '';

            if (results.length === 0) {
                searchResults.innerHTML = '<p class="text-muted">未找到匹配的文档</p>';
                return;
            }

            results.forEach(result => {
                const item = document.createElement('div');
                item.className = 'mb-2 p-2 border rounded';
                item.onclick = () => showDocumentDetails(result.document_id);
                
                item.innerHTML = `
                    <h6>${result.filename}</h6>
                    <p class="text-muted small">${result.content || '无内容'}</p>
                `;
                
                searchResults.appendChild(item);
            });
        }

        // 显示文档详情
        function showDocumentDetails(documentId) {
            axios.get(`${API_BASE_URL}/documents/${documentId}`)
                .then(response => {
                    const doc = response.data;
                    renderDocumentDetails(doc);
                    const modal = new bootstrap.Modal(document.getElementById('documentModal'));
                    modal.show();
                })
                .catch(error => {
                    console.error('获取文档详情失败:', error);
                });
        }

        // 渲染文档详情
        function renderDocumentDetails(doc) {
            const documentDetails = document.getElementById('documentDetails');
            
            let tagsHtml = '';
            if (doc.tags && doc.tags.length > 0) {
                tagsHtml = doc.tags.map(tag => `<span class="badge bg-secondary tag">${tag.name}</span>`).join('');
            }

            documentDetails.innerHTML = `
                <div class="mb-3">
                    <h5>${doc.filename}</h5>
                    <div class="mt-2">
                        <span class="badge bg-primary me-2">${doc.file_type}</span>
                        <span class="badge bg-info">${doc.category || '未分类'}</span>
                    </div>
                </div>
                <div class="mb-3">
                    <h6>摘要</h6>
                    <p>${doc.summary || '无摘要'}</p>
                </div>
                <div class="mb-3">
                    <h6>关键词</h6>
                    <p>${doc.keywords || '无关键词'}</p>
                </div>
                <div class="mb-3">
                    <h6>标签</h6>
                    <div>${tagsHtml || '无标签'}</div>
                </div>
                <div class="mb-3">
                    <h6>内容</h6>
                    <pre class="bg-light p-3 rounded" style="white-space: pre-wrap;">${doc.content || '无内容'}</pre>
                </div>
                <div class="text-muted small">
                    创建时间: ${new Date(doc.created_at).toLocaleString()}
                </div>
            `;
        }

        // 发送聊天消息
        function sendChatMessage() {
            const chatInput = document.getElementById('chatInput');
            const message = chatInput.value.trim();
            
            if (!message) return;

            // 显示用户消息
            addChatMessage(message, 'user');
            chatInput.value = '';

            // 发送到服务器
            axios.post(`${API_BASE_URL}/chat`, { query: message })
                .then(response => {
                    const answer = response.data.answer;
                    // 显示机器人回复
                    addChatMessage(answer, 'bot');
                })
                .catch(error => {
                    console.error('聊天失败:', error);
                    addChatMessage('抱歉，聊天服务暂时不可用，请稍后重试。', 'bot');
                });
        }

        // 添加聊天消息
        function addChatMessage(text, type) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type === 'user' ? 'user-message' : 'bot-message'}`;
            messageDiv.textContent = text;
            chatContainer.appendChild(messageDiv);
            // 滚动到底部
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
